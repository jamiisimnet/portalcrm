<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JamiiSim Network - Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 50%, #dce3ec 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(44, 122, 94, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #e2edeb;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #1e4a3b, #2c7a5e);
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #2c7a5e, #3a9a7a);
        }
        
        /* Login Container - Premium Glassmorphism */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b2b26 0%, #1e4a3b 50%, #2c7a5e 100%);
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: float 20s linear infinite;
        }
        
        .login-container::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0,0,0,0.3);
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card h2 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e4a3b, #2c7a5e, #5bc0a3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 2rem;
            animation: shimmer 3s ease-in-out infinite;
            background-size: 200% auto;
        }
        
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Dashboard Layout */
        .dashboard {
            display: flex;
            min-height: 100vh;
            position: relative;
            background: radial-gradient(circle at 0% 0%, rgba(44, 122, 94, 0.03) 0%, transparent 50%);
        }
        
        /* Mobile Menu Toggle Button */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            align-items: center;
            justify-content: center;
        }
        
        .mobile-menu-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(30,74,59,0.3);
        }
        
        /* Mobile Overlay */
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Premium Sidebar - Responsive */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a221d 0%, #0c2b25 50%, #0a1f1a 100%);
            backdrop-filter: blur(10px);
            color: white;
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.1);
            animation: slideInLeft 0.5s ease;
            overflow-y: auto;
            z-index: 1000;
        }
        
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .sidebar .logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        
        .sidebar .logo:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        
        .sidebar .logo i {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #5bc0a3, #2c7a5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: logoPulse 2s ease-in-out infinite;
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .sidebar nav ul {
            list-style: none;
        }
        
        .sidebar nav ul li {
            margin: 0.5rem 0;
            animation: fadeInLeft 0.3s ease forwards;
            opacity: 0;
        }
        
        .sidebar nav ul li:nth-child(1) { animation-delay: 0.05s; }
        .sidebar nav ul li:nth-child(2) { animation-delay: 0.1s; }
        .sidebar nav ul li:nth-child(3) { animation-delay: 0.15s; }
        .sidebar nav ul li:nth-child(4) { animation-delay: 0.2s; }
        .sidebar nav ul li:nth-child(5) { animation-delay: 0.25s; }
        .sidebar nav ul li:nth-child(6) { animation-delay: 0.3s; }
        .sidebar nav ul li:nth-child(7) { animation-delay: 0.35s; }
        
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .sidebar nav ul li button {
            background: transparent;
            border: none;
            color: #b8cdc5;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .sidebar nav ul li button::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: rgba(44, 122, 94, 0.4);
            transition: width 0.3s;
            z-index: -1;
        }
        
        .sidebar nav ul li button:hover::before {
            width: 100%;
        }
        
        .sidebar nav ul li button i {
            width: 24px;
            font-size: 1.1rem;
            transition: transform 0.3s, color 0.3s;
        }
        
        .sidebar nav ul li button:hover i {
            transform: scale(1.15);
            color: #5bc0a3;
        }
        
        .sidebar nav ul li button:hover {
            color: white;
            transform: translateX(5px);
        }
        
        .sidebar nav ul li .active {
            background: linear-gradient(135deg, #2c7a5e, #1e4a3b);
            color: white;
            box-shadow: 0 4px 12px rgba(44, 122, 94, 0.4);
            animation: activePulse 2s ease-in-out infinite;
        }
        
        @keyframes activePulse {
            0%, 100% { box-shadow: 0 4px 12px rgba(44, 122, 94, 0.4); }
            50% { box-shadow: 0 6px 20px rgba(44, 122, 94, 0.6); }
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            animation: fadeIn 0.5s ease;
            transition: all 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Premium Card */
        .card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(44, 122, 94, 0.15);
            position: relative;
            overflow: hidden;
            animation: cardAppear 0.4s ease backwards;
        }
        
        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2c7a5e, #5bc0a3, #2c7a5e);
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }
        
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .card:hover {
            box-shadow: 0 8px 35px rgba(0,0,0,0.12);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 1);
        }
        
        /* ==================== RESPONSIVE DESIGN ==================== */
        
        /* Tablet Styles */
        @media (max-width: 1024px) {
            .sidebar {
                width: 260px;
            }
            
            .main-content {
                padding: 1.5rem;
            }
            
            .stats-grid {
                gap: 1rem;
            }
        }
        
        /* Mobile Styles - Collapsible Menu */
        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }
            
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(0);
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: none;
            }
            
            .sidebar.open {
                left: 0;
                box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            }
            
            .main-content {
                padding: 1rem;
                width: 100%;
                margin-left: 0;
            }
            
            .card {
                padding: 1.2rem;
                border-radius: 24px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .stat-card {
                padding: 1rem;
            }
            
            .stat-value {
                font-size: 1.8rem;
            }
            
            .stat-icon {
                width: 40px;
                height: 40px;
            }
            
            .stat-icon i {
                font-size: 1.2rem;
            }
            
            .section-title {
                font-size: 1.1rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            
            .section-title button {
                width: 100%;
            }
            
            .search-bar {
                flex-direction: column;
                border-radius: 30px;
                padding: 1rem;
            }
            
            .search-bar input,
            .search-bar select,
            .search-bar button {
                width: 100%;
            }
            
            .submenu {
                flex-direction: column;
            }
            
            .submenu button {
                width: 100%;
                justify-content: center;
            }
            
            .customer-header {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem;
            }
            
            .customer-avatar {
                width: 80px;
                height: 80px;
                font-size: 2.5rem;
            }
            
            .stats-badge {
                min-width: 100px;
                padding: 0.5rem 1rem;
            }
            
            .stats-badge .number {
                font-size: 1.4rem;
            }
            
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .form-container {
                padding: 0;
            }
            
            .vertical-form {
                width: 100%;
            }
            
            .action-btn {
                padding: 5px 10px;
                font-size: 0.65rem;
            }
            
            .modern-table th,
            .modern-table td {
                padding: 10px 12px;
                font-size: 0.75rem;
            }
            
            .user-badge {
                display: none;
            }
            
            .global-footer-clock {
                bottom: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            
            .toast {
                bottom: 10px;
                right: 10px;
                left: 10px;
                width: auto;
                font-size: 0.85rem;
                padding: 0.8rem 1rem;
            }
        }
        
        /* Small Mobile Styles */
        @media (max-width: 480px) {
            .sidebar {
                width: 260px;
                left: -260px;
            }
            
            .main-content {
                padding: 0.75rem;
            }
            
            .card {
                padding: 1rem;
                border-radius: 20px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
            
            .stat-label {
                font-size: 0.7rem;
            }
            
            .section-title {
                font-size: 1rem;
            }
            
            .form-group input {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 0.9rem;
            }
            
            .modern-table th,
            .modern-table td {
                padding: 8px 10px;
                font-size: 0.7rem;
            }
            
            .action-btn {
                padding: 4px 8px;
                font-size: 0.6rem;
            }
            
            .mobile-menu-toggle {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
                top: 12px;
                left: 12px;
            }
        }
        
        /* Keep the rest of the styles from previous version */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #ffffff 0%, #fafdfb 100%);
            padding: 1.5rem;
            border-radius: 28px;
            border: 1px solid rgba(44, 122, 94, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            animation: statAppear 0.4s ease backwards;
        }
        
        .stat-card:nth-child(1) { animation-delay: 0.05s; }
        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.15s; }
        .stat-card:nth-child(4) { animation-delay: 0.2s; }
        
        @keyframes statAppear {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #2c7a5e, #5bc0a3);
        }
        
        .stat-card::after {
            content: '';
            position: absolute;
            bottom: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(44,122,94,0.05) 0%, transparent 70%);
            transition: all 0.5s;
        }
        
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(30, 74, 59, 0.15);
        }
        
        .stat-card:hover::after {
            transform: scale(1.2);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #e8f5e9, #d4ebd6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        
        .stat-card:hover .stat-icon {
            transform: scale(1.05) rotate(5deg);
        }
        
        .stat-icon i {
            font-size: 1.5rem;
            color: #2c7a5e;
        }
        
        /* Form Styles */
        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .vertical-form {
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.3s ease backwards;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.05s; }
        .form-group:nth-child(2) { animation-delay: 0.1s; }
        .form-group:nth-child(3) { animation-delay: 0.15s; }
        .form-group:nth-child(4) { animation-delay: 0.2s; }
        .form-group:nth-child(5) { animation-delay: 0.25s; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            background: linear-gradient(135deg, #1e4a3b, #2c7a5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2edeb;
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            background: white;
        }
        
        .form-group input:focus {
            border-color: #2c7a5e;
            outline: none;
            box-shadow: 0 0 0 4px rgba(44, 122, 94, 0.1);
            transform: translateY(-2px);
        }
        
        .form-group input:read-only {
            background: #f8fbf9;
            cursor: not-allowed;
        }
        
        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 74, 59, 0.35);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #f0f4f2, #e8eeeb);
            color: #1e4a3b;
            border: 1px solid #cbdcd6;
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #e8eeeb, #dce6e2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 24px;
            background: white;
            animation: fadeInUp 0.4s ease;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        
        .modern-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.85rem;
        }
        
        .modern-table thead tr {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
        }
        
        .modern-table th {
            padding: 16px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            color: white;
            text-transform: uppercase;
        }
        
        .modern-table th:first-child {
            border-top-left-radius: 20px;
        }
        
        .modern-table th:last-child {
            border-top-right-radius: 20px;
        }
        
        .modern-table td {
            padding: 14px 20px;
            border-bottom: 1px solid #eef2f0;
            color: #1f2e2a;
            transition: all 0.2s;
        }

<body>
<div id="app"></div>

<script>
    const API_BASE_URL = "https://script.google.com/macros/s/AKfycbx-ggpKM1cMYW48ojsD3wuy8vkyJP4sLe31KDi4w8sF559e22i8ZvVFydnooGu4lnpQ/exec";
    
    const USER_ROLES = {
        admin: { name: "Admin", canActivate: true, canSeeCommission: true },
        manager: { name: "Manager", canActivate: false, canSeeCommission: false }
    };
    
    const DEMO_USERS = {
        admin: { password: "admin123", role: "admin" },
        manager: { password: "manager123", role: "manager" }
    };
    
    let currentUser = null;
    let currentUserRole = null;
    let currentPage = "Home";
    let reportType = "Line";
    let mobileMenuOpen = false;
    
    function showToast(msg, isError = false) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function apiCall(action, params = {}) {
        let url = `${API_BASE_URL}?action=${action}`;
        Object.keys(params).forEach(key => {
            if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
                url += `&${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`;
            }
        });
        
        try {
            const response = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("API Error:", err);
            return { success: false, error: err.message };
        }
    }
    
    function escapeHtml(str) {
        if (str === undefined || str === null) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function normalizePhone(phone) {
        if (!phone) return "";
        let normalized = String(phone).replace(/\D/g, '');
        if (normalized.startsWith('254')) {
            normalized = normalized.substring(3);
        } else if (normalized.startsWith('0')) {
            normalized = normalized.substring(1);
        }
        return normalized;
    }
    
    function hasActivationAccess() {
        return USER_ROLES[currentUserRole]?.canActivate !== false;
    }
    
    function canSeeCommission() {
        return USER_ROLES[currentUserRole]?.canSeeCommission !== false;
    }
    
    function getMenuPages() {
        const pages = ["Home", "Line Registration", "Till Registration", "Customer 360", "Report"];
        if (hasActivationAccess()) {
            pages.splice(4, 0, "Activation", "Transactions");
        }
        return pages;
    }
    
    function getIcon(page) {
        const icons = { 
            Home: "fa-home", LineReg: "fa-user-plus", TillReg: "fa-cash-register", 
            Activation: "fa-toggle-on", Transactions: "fa-exchange-alt", 
            Customer360: "fa-id-card", Report: "fa-chart-line" 
        };
        return icons[page] || "fa-circle";
    }
    
    function renderLogin() {
        return `
            <div class="login-container">
                <div class="login-card">
                    <h2><i class="fas fa-bolt"></i> JamiiSim Network</h2>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <input type="text" id="loginUser" placeholder="admin or manager">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="loginPass" placeholder="••••••">
                    </div>
                    <button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
                    <div id="loginError" style="color:#c2410c; text-align:center; margin-top:1rem;"></div>
                </div>
            </div>
        `;
    }
    
    async function doLogin() {
        const username = document.getElementById("loginUser").value;
        const password = document.getElementById("loginPass").value;
        const errorDiv = document.getElementById("loginError");
        
        if (!username || !password) {
            errorDiv.innerHTML = "Please enter both username and password";
            return;
        }
        
        errorDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying credentials...';
        
        const user = DEMO_USERS[username];
        if (user && user.password === password) {
            currentUser = username;
            currentUserRole = user.role;
            currentPage = "Home";
            render();
            showToast(`Welcome back, ${username}!`);
        } else {
            errorDiv.innerHTML = "Invalid username or password";
        }
    }
    
    // Mobile Menu Functions
    function initMobileMenu() {
        // Remove existing elements if any
        const existingToggle = document.querySelector('.mobile-menu-toggle');
        const existingOverlay = document.querySelector('.mobile-overlay');
        if (existingToggle) existingToggle.remove();
        if (existingOverlay) existingOverlay.remove();
        
        // Create mobile menu toggle button
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'mobile-menu-toggle';
        toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
        toggleBtn.onclick = toggleMobileMenu;
        document.body.appendChild(toggleBtn);
        
        // Create overlay
        const overlay = document.createElement('div');
        overlay.className = 'mobile-overlay';
        overlay.onclick = closeMobileMenu;
        document.body.appendChild(overlay);
        
        // Update sidebar
        const sidebar = document.querySelector('.sidebar');
        if (sidebar) {
            sidebar.classList.remove('open');
        }
    }
    
    function toggleMobileMenu() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const toggleBtn = document.querySelector('.mobile-menu-toggle');
        
        if (sidebar && overlay) {
            if (mobileMenuOpen) {
                sidebar.classList.remove('open');
                overlay.style.display = 'none';
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                mobileMenuOpen = false;
            } else {
                sidebar.classList.add('open');
                overlay.style.display = 'block';
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-times"></i>';
                mobileMenuOpen = true;
            }
        }
    }
    
    function closeMobileMenu() {
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const toggleBtn = document.querySelector('.mobile-menu-toggle');
        
        if (sidebar && overlay) {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
            if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
            mobileMenuOpen = false;
        }
    }
    
    function renderDashboard() {
        const pages = getMenuPages();
        const pageKeys = { 
            "Home": "Home", "Line Registration": "LineReg", "Till Registration": "TillReg", 
            "Activation": "Activation", "Transactions": "Transactions", 
            "Customer 360": "Customer360", "Report": "Report" 
        };
        
        let content = "";
        if (currentPage === "Home") content = '<div id="pageContent"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading dashboard...</div></div>';
        else if (currentPage === "LineReg") content = renderLineReg();
        else if (currentPage === "TillReg") content = renderTillReg();
        else if (currentPage === "Customer360") content = renderCustomer360();
        else if (currentPage === "Activation") content = '<h3 class="section-title"><i class="fas fa-toggle-on"></i> Till Activation</h3><div id="activationContent"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading tills...</div></div>';
        else if (currentPage === "Transactions") content = '<h3 class="section-title"><i class="fas fa-exchange-alt"></i> Unit Transactions</h3><div id="transactionsContent"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading tills...</div></div>';
        else if (currentPage === "Report") content = renderReportPage();
        
        return `
            <div class="dashboard">
                <div class="sidebar">
                    <div class="logo">
                        <i class="fas fa-bolt"></i>
                        <span>JamiiSim</span>
                    </div>
                    <nav>
                        <ul>
                            ${pages.map(p => `<li><button class="${currentPage === pageKeys[p] ? 'active' : ''}" data-page="${pageKeys[p]}"><i class="fas ${getIcon(pageKeys[p])}"></i> <span>${p}</span></button></li>`).join('')}
                            <li style="margin-top:2rem;"><button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button></li>
                        </ul>
                    </nav>
                    <div class="user-badge">
                        <i class="fas fa-user-shield"></i> ${USER_ROLES[currentUserRole]?.name || currentUserRole}
                    </div>
                </div>
                <div class="main-content">
                    <div class="card">
                        ${content}
                    </div>
                </div>
            </div>
        `;
    }
    
    function renderLineReg() {
        return `
            <div class="form-container">
                <h3 class="section-title"><i class="fas fa-user-plus"></i> Register New Line</h3>
                <div class="vertical-form">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="lineName" placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> ID Number</label>
                        <input type="text" id="lineId" placeholder="Enter ID number">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="linePhone" placeholder="0712345678">

                    <div id="lineFeedback" style="margin-top: 1rem;"></div>
                </div>
            </div>
        `;
    }
    
    function renderTillReg() {
        return `
            <div class="form-container">
                <h3 class="section-title"><i class="fas fa-cash-register"></i> Register New Till</h3>
                <div class="vertical-form">
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number (Lookup Line)</label>
                        <input type="tel" id="fetchPhone" placeholder="0712345678">
                        <button class="btn-secondary" id="fetchLineBtn" style="margin-top:0.5rem; width:auto; padding:10px 20px;">
                            <i class="fas fa-search"></i> Fetch Line Data
                        </button>
                        <div id="fetchInfo" class="fetch-info"></div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="tillName" readonly placeholder="Will auto-fill">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> ID Number</label>
                        <input type="text" id="tillId" readonly placeholder="Will auto-fill">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Date of Birth</label>
                        <input type="text" id="tillDob" readonly placeholder="Will auto-fill">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-hashtag"></i> Till Number</label>

                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-store"></i> Store Number</label>
                        <input type="text" id="storeNumber" placeholder="e.g., STR01">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Operator ID</label>
                        <input type="text" id="operatorId" readonly placeholder="Auto-generated">
                    </div>
                    <button class="btn" id="saveTillBtn"><i class="fas fa-save"></i> Register Till</button>
                    <div id="tillFeedback" style="margin-top: 1rem;"></div>
                </div>
            </div>
        `;
    }
    
    function renderCustomer360() {
        return `

    async function loadActivationTable() {
        if (!hasActivationAccess()) {
            document.getElementById("activationContent").innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i><br>Access Denied</div>`;
            return;
        }
        
        const container = document.getElementById("activationContent");
        if (!container) return;
        
        const result = await apiCall("getTills");
        const tills = result.tills || [];
        
        if (!result.success || tills.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><br>No tills registered yet</div>`;
            return;
        }
        
        let html = `<div class="table-wrapper"><table class="modern-table"><thead><tr>

            <th>Store</th>
            <th>Status</th>

        html += `</tbody></table></div>`;
        container.innerHTML = html;

            btn.addEventListener("click", async () => {

    async function searchCustomers() {
        const searchTerm = document.getElementById("customerSearchInput")?.value.trim();
        const searchType = document.getElementById("searchType")?.value;
        const resultsContainer = document.getElementById("customerSearchResults");
        const detailContainer = document.getElementById("customerDetailView");
        
        if (!searchTerm) {
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><br>Enter a name, phone number, or ID to search</div>';
            detailContainer.innerHTML = '';
            return;
        }
        
        resultsContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Searching customers...</div>';
        detailContainer.innerHTML = '';
        
        try {
            const linesResult = await apiCall("getLines");
            const lines = linesResult.lines || [];
            
            if (lines.length === 0) {
                resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><br>No customers found. Please register some lines first.</div>';
                return;
            }
            
            let customers = lines.filter(line => {
                const term = searchTerm.toLowerCase();
                if (searchType === "name") {
                    return line.name?.toLowerCase().includes(term);
                } else if (searchType === "phone") {
                    return line.phone?.includes(searchTerm);
                } else if (searchType === "id") {
                    return line.idNumber?.toLowerCase().includes(term);
                } else {
                    return line.name?.toLowerCase().includes(term) || 
                           line.phone?.includes(searchTerm) || 
                           line.idNumber?.toLowerCase().includes(term);
                }
            });
            
            if (customers.length === 0) {
                resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-user-slash"></i><br>No customers found matching "' + escapeHtml(searchTerm) + '"</div>';
                return;
            }
            
            const tillsResult = await apiCall("getTills");
            const tills = tillsResult.tills || [];
            
            resultsContainer.innerHTML = `
                <div style="margin-bottom: 1.5rem;">
                    <h4 style="margin-bottom: 1rem; color: #1e4a3b;">
                        <i class="fas fa-users"></i> Search Results 
                        <span style="font-size: 0.9rem; color: #5b6e69;">(${customers.length} customer${customers.length !== 1 ? 's' : ''} found)</span>
                    </h4>
                    <div class="table-wrapper">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Phone</th>
                                    <th>ID Number</th>
                                    <th>Total Tills</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${customers.map(customer => {
                                    const customerTills = tills.filter(t => normalizePhone(t.phone) === normalizePhone(customer.phone));
                                    return `
                                        <tr>
                                            <td><strong>${escapeHtml(customer.name)}</strong></td>
                                            <td><i class="fas fa-phone"></i> ${escapeHtml(customer.phone)}</div>
                                            <td>${escapeHtml(customer.idNumber)}</div>
                                            <td><span class="badge badge-info">${customerTills.length} tills</span></div>
                                            <td><button class="action-btn view-customer-btn" data-phone="${customer.phone}">View 360°</button></div>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.view-customer-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const phone = btn.dataset.phone;
                    await loadCustomerDetail(phone);
                });
            });
            
        } catch (error) {
            console.error("Search error:", error);
            resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><br>Error searching customers. Please try again.</div>';
        }
    }

    async function loadReportContent() {

                container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><br>No lines registered yet</div>`;

            const reportData = lines.map(l => ({

                "ID Number": l.idNumber || "-",
                Phone: l.phone || "-",
                DOB: l.dob || "-",
                "Date Created": l.dateCreated ? new Date(l.dateCreated).toLocaleDateString() : '-'
            }));
            
            container.innerHTML = `

                                <th>Owner Phone</th>

                                <th>Status</th>
                                <th>Date Created</th>

                                    <td>${escapeHtml(row["Owner Phone"])}</div>
                                    <td>${escapeHtml(row["Till Number"])}</div>
                                    <td>${escapeHtml(row.Store)}</div>
                                    <td><span class="units-black">${row.Units} units</span></div>
                                    <td><span class="badge ${row.Status === 'Active' ? 'badge-success' : 'badge-danger'}">${row.Status}</span></div>
                                    <td>${escapeHtml(row["Date Created"])}</div>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>

    function attachMenuEvents() {
        document.querySelectorAll("[data-page]").forEach(btn => {
            btn.addEventListener("click", () => {
                currentPage = btn.dataset.page;
                if (window.innerWidth <= 768) {
                    closeMobileMenu();
                }
                render();
            });
        });
        
        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            currentUser = null;
            currentUserRole = null;
            render();
            showToast("Logged out successfully");
        });
        
        if (currentPage === "LineReg") {
            document.getElementById("saveLineBtn")?.addEventListener("click", async () => {
                const name = document.getElementById("lineName").value.trim();
                const idNumber = document.getElementById("lineId").value.trim();
                let phone = document.getElementById("linePhone").value.trim();
                const dob = document.getElementById("lineDob").value;
                const feedback = document.getElementById("lineFeedback");
                
                if (!name || !idNumber || !phone || !dob) {
                    feedback.innerHTML = '<span style="color:#c2410c;">All fields are required</span>';
                    return;
                }
                
                phone = phone.replace(/\D/g, '');
                feedback.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Registering...';
                
                const res = await apiCall("registerLine", { name, idNumber, phone, dob });
                if (res.success) {
                    feedback.innerHTML = '<span style="color:#2b7e5a;">Line registered successfully!</span>';
                    document.getElementById("lineName").value = "";
                    document.getElementById("lineId").value = "";
                    document.getElementById("linePhone").value = "";
                    document.getElementById("lineDob").value = "";
                    showToast("Line registered successfully!");
                    setTimeout(() => feedback.innerHTML = "", 3000);
                } else {
                    feedback.innerHTML = `<span style="color:#c2410c;">${res.error}</span>`;
                }
            });
        }
        
        if (currentPage === "TillReg") {
            document.getElementById("fetchLineBtn")?.addEventListener("click", async () => {
                const phone = document.getElementById("fetchPhone").value.trim();
                const fetchInfo = document.getElementById("fetchInfo");
                
                if (!phone) {
                    fetchInfo.innerHTML = 'Enter a phone number';
                    fetchInfo.className = 'fetch-info error';
                    return;
                }
                
                fetchInfo.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Searching...';
                fetchInfo.className = 'fetch-info';
                
                const res = await apiCall("getLines");
                if (!res.success || !res.lines) {
                    fetchInfo.innerHTML = 'Error fetching lines';
                    fetchInfo.className = 'fetch-info error';
                    return;
                }
                
                const normalizedInput = normalizePhone(phone);
                const found = res.lines.find(line => normalizePhone(line.phone) === normalizedInput);
                
                if (found) {
                    document.getElementById("tillName").value = found.name;
                    document.getElementById("tillId").value = found.idNumber;
                    document.getElementById("tillDob").value = found.dob;
                    
                    const nameParts = found.name.trim().split(/\s+/);
                    let operatorId = "";
                    if (nameParts.length === 1) {
                        operatorId = nameParts[0].substring(0, 2).toUpperCase();
                    } else {
                        operatorId = (nameParts[0].charAt(0) + nameParts[nameParts.length - 1].charAt(0)).toUpperCase();
                    }
                    document.getElementById("operatorId").value = operatorId;
                    
                    fetchInfo.innerHTML = `Line found: ${found.name}`;
                    fetchInfo.className = 'fetch-info success';
                    showToast("Line found! You can now register the till.");
                } else {
                    fetchInfo.innerHTML = `No line found for "${phone}"`;
                    fetchInfo.className = 'fetch-info error';
                    showToast("No line found with this phone number", true);
                    
                    document.getElementById("tillName").value = "";
                    document.getElementById("tillId").value = "";
                    document.getElementById("tillDob").value = "";
                    document.getElementById("operatorId").value = "";
                }
            });
            
            document.getElementById("saveTillBtn")?.addEventListener("click", async () => {
                let phone = document.getElementById("fetchPhone").value.trim();
                phone = phone.replace(/\D/g, '');
                
                const payload = {
                    phone: phone,
                    name: document.getElementById("tillName").value,
                    idNumber: document.getElementById("tillId").value,
                    dob: document.getElementById("tillDob").value,
                    tillNumber: document.getElementById("tillNumber").value.trim(),
                    storeNumber: document.getElementById("storeNumber").value.trim(),
                    operatorId: document.getElementById("operatorId").value
                };
                const feedback = document.getElementById("tillFeedback");
                
                if (!payload.phone || !payload.tillNumber || !payload.storeNumber || !payload.name) {
                    feedback.innerHTML = '<span style="color:#c2410c;">Please fetch a line first</span>';
                    return;
                }
                
                feedback.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Registering...';
                const res = await apiCall("registerTill", payload);
                
                if (res.success) {
                    feedback.innerHTML = '<span style="color:#2b7e5a;">Till registered successfully!</span>';
                    document.getElementById("tillNumber").value = "";
                    document.getElementById("storeNumber").value = "";
                    showToast("Till registered successfully!");
                    setTimeout(() => feedback.innerHTML = "", 3000);
                } else {
                    feedback.innerHTML = `<span style="color:#c2410c;">${res.error}</span>`;
                }
            });
        }
        
        if (currentPage === "Customer360") {
            document.getElementById("searchCustomerBtn")?.addEventListener("click", searchCustomers);
            document.getElementById("customerSearchInput")?.addEventListener("keypress", (e) => {
                if (e.key === "Enter") searchCustomers();
            });
        }
        
        if (currentPage === "Report") {
            document.querySelectorAll("[data-report]").forEach(btn => {
                btn.addEventListener("click", () => {
                    reportType = btn.dataset.report;
                    render();
                });
            });
        }
    }
    
    function addGlobalFooterClock() {
        if (document.querySelector('.global-footer-clock')) return;
        const clockDiv = document.createElement('div');
        clockDiv.className = 'global-footer-clock';
        clockDiv.innerHTML = `<i class="fas fa-clock"></i><div><div id="clockTime">--:--:--</div><div id="clockDate">--- --, ----</div></div>`;
        document.body.appendChild(clockDiv);
        function updateClock() {
            const now = new Date();
            const timeEl = document.getElementById('clockTime');
            const dateEl = document.getElementById('clockDate');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString();
            if (dateEl) dateEl.textContent = now.toLocaleDateString();
        }
        updateClock();
        setInterval(updateClock, 1000);
    }
    
    async function loadPageData() {
        if (currentPage === "Home") await loadHomeStats();
        if (currentPage === "Activation" && hasActivationAccess()) await loadActivationTable();
        if (currentPage === "Transactions" && hasActivationAccess()) await loadTransactionsTable();
        if (currentPage === "Report") await loadReportContent();
        if (currentPage === "Customer360") {
            const resultsContainer = document.getElementById("customerSearchResults");
            if (resultsContainer) {
                resultsContainer.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><br>Search for a customer to see their 360° view</div>';
            }
        }
    }
    
    function render() {
        const app = document.getElementById("app");
        if (!currentUser) {
            app.innerHTML = renderLogin();
            document.getElementById("loginBtn")?.addEventListener("click", doLogin);
            const existingClock = document.querySelector('.global-footer-clock');
            if (existingClock) existingClock.remove();
            const existingToggle = document.querySelector('.mobile-menu-toggle');
            if (existingToggle) existingToggle.remove();
            const existingOverlay = document.querySelector('.mobile-overlay');
            if (existingOverlay) existingOverlay.remove();
            return;
        }
        app.innerHTML = renderDashboard();
        attachMenuEvents();
        loadPageData();
        addGlobalFooterClock();
        initMobileMenu();
    }
    
    render();
</script>
</body>
</html>
