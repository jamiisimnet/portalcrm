<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JamiiSim - Customer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b2b26 0%, #1e4a3b 50%, #2c7a5e 100%);
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e4a3b, #2c7a5e, #5bc0a3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e4a3b;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2edeb;
            border-radius: 30px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #2c7a5e;
            outline: none;
            box-shadow: 0 0 0 3px rgba(44, 122, 94, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 74, 59, 0.3);
        }

        /* Customer Portal Dashboard - Sidebar Layout */
        .customer-portal {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            position: relative;
        }

        /* Mobile Menu Toggle Button */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            align-items: center;
            justify-content: center;
        }

        .mobile-menu-toggle:hover {
            transform: scale(1.05);
        }

        /* Mobile Overlay */
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Sidebar Navigation */
        .portal-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a221d 0%, #0c2b25 50%, #0a1f1a 100%);
            color: white;
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        /* Mobile Sidebar (closed) */
        @media (max-width: 768px) {
            .portal-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: none;
            }
            
            .portal-sidebar.open {
                left: 0;
                box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            }
            
            .mobile-menu-toggle {
                display: flex;
            }
            
            .mobile-overlay {
                display: none;
            }
            
            .mobile-overlay.show {
                display: block;
            }
            
            .portal-main {
                width: 100%;
                margin-left: 0;
            }
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.5rem;
            margin-bottom: 2.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            transition: all 0.3s;
        }

        .sidebar-logo:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .sidebar-logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo-icon i {
            font-size: 1.5rem;
            color: #5bc0a3;
        }

        .sidebar-logo-text h2 {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #d4ebd6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sidebar-logo-text p {
            font-size: 0.6rem;
            opacity: 0.7;
        }

        .sidebar-nav {
            flex: 1;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav ul li {
            margin: 0.5rem 0;
        }

        .sidebar-nav ul li button {
            background: transparent;
            border: none;
            color: #b8cdc5;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .sidebar-nav ul li button::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 0;
            background: rgba(44, 122, 94, 0.4);
            transition: width 0.3s;
            z-index: -1;
        }

        .sidebar-nav ul li button:hover::before {
            width: 100%;
        }

        .sidebar-nav ul li button i {
            width: 24px;
            font-size: 1.1rem;
            transition: transform 0.3s, color 0.3s;
        }

        .sidebar-nav ul li button:hover i {
            transform: scale(1.15);
            color: #5bc0a3;
        }

        .sidebar-nav ul li button:hover {
            color: white;
            transform: translateX(5px);
        }

        .sidebar-nav ul li .active {
            background: linear-gradient(135deg, #2c7a5e, #1e4a3b);
            color: white;
            box-shadow: 0 4px 12px rgba(44, 122, 94, 0.4);
        }

        .sidebar-nav ul li .active i {
            color: #5bc0a3;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-footer button {
            background: transparent;
            border: none;
            color: #b8cdc5;
            width: 100%;
            text-align: left;
            padding: 12px 16px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .sidebar-footer button:hover {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
        }

        .sidebar-footer button i {
            width: 24px;
        }

        /* Main Content Area */
        .portal-main {
            flex: 1;
            overflow-y: auto;
            transition: all 0.3s;
        }

        /* Enhanced Header */
        .portal-header {
            background: linear-gradient(135deg, #1e4a3b 0%, #0f3b2f 50%, #1e4a3b 100%);
            padding: 1.5rem 2rem;
            position: relative;
            overflow: hidden;
        }

        .portal-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="80" cy="40" r="3" fill="rgba(255,255,255,0.08)"/><circle cx="50" cy="70" r="2" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="80" r="1.5" fill="rgba(255,255,255,0.08)"/></svg>');
            background-repeat: repeat;
            opacity: 0.3;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: relative;
            z-index: 1;
        }

        .welcome-section h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            background: linear-gradient(135deg, #ffffff, #d4ebd6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome-section p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .customer-profile-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .profile-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #5bc0a3, #2c7a5e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar i {
            font-size: 1.3rem;
            color: white;
        }

        .profile-details h3 {
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #ffd89b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .profile-details p {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            padding: 1.5rem 2rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(44, 122, 94, 0.1);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-color: rgba(44, 122, 94, 0.3);
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e8f5e9, #d4ebd6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.75rem;
        }

        .stat-icon i {
            font-size: 1.3rem;
            color: #2c7a5e;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e4a3b;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #5b6e69;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Content Area */
        .content-area {
            padding: 1rem 2rem 2rem 2rem;
            min-height: 400px;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        .data-table thead tr {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            color: white;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 10px 16px;
            border-bottom: 1px solid #eef2f0;
            color: #1f2e2a;
            font-size: 0.85rem;
        }

        .data-table tbody tr:hover {
            background: #f8fbf9;
        }

        /* Badges */
        .badge-active {
            background: #e8f5e9;
            color: #2b7e5a;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge-inactive {
            background: #ffebee;
            color: #c2410c;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge-completed {
            background: #e8f5e9;
            color: #2b7e5a;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-incoming {
            background: #e3f2fd;
            color: #1565c0;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .units-value {
            font-weight: 700;
            color: #1e4a3b;
        }

        /* Transfer Form */
        .transfer-form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .transfer-form h3 {
            color: #1e4a3b;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.2rem;
        }

        .transfer-form select,
        .transfer-form input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2edeb;
            border-radius: 16px;
            font-size: 0.9rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .feedback-message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
        }

        .feedback-success {
            background: #e8f5e9;
            color: #2b7e5a;
        }

        .feedback-error {
            background: #ffebee;
            color: #c2410c;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-size: 0.85rem;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #5b6e69;
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.3;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .portal-header {
                padding: 1rem;
                margin-top: 40px;
            }
            
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            
            .customer-profile-card {
                width: 100%;
                justify-content: center;
            }
            
            .stats-container {
                padding: 1rem;
                gap: 0.75rem;
                grid-template-columns: repeat(2, 1fr);
            }
            
            .content-area {
                padding: 1rem;
            }
            
            .stat-card {
                padding: 0.75rem;
            }
            
            .stat-number {
                font-size: 1.2rem;
            }
            
            .stat-icon {
                width: 35px;
                height: 35px;
            }
            
            .stat-icon i {
                font-size: 1rem;
            }
            
            .welcome-section h1 {
                font-size: 1.2rem;
            }
            
            .welcome-section p {
                font-size: 0.7rem;
            }
            
            .transfer-form {
                padding: 1rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 8px 12px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            .portal-header {
                padding: 0.75rem;
            }
            
            .customer-profile-card {
                padding: 0.3rem 1rem;
            }
            
            .profile-avatar {
                width: 35px;
                height: 35px;
            }
            
            .profile-details h3 {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // Google Sheets API Configuration
    const API_BASE_URL = "https://script.google.com/macros/s/AKfycbx-ggpKM1cMYW48ojsD3wuy8vkyJP4sLe31KDi4w8sF559e22i8ZvVFydnooGu4lnpQ/exec";
    
    let currentCustomer = null;
    let customerTills = [];
    let transferHistory = [];
    let totalUnitsReceived = 0;
    let transactionCount = 0;
    let currentTab = "tills";
    let mobileMenuOpen = false;
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#fee2e2' : 'white';
        toast.style.color = isError ? '#dc2626' : '#1e4a3b';
        toast.style.borderLeft = isError ? '4px solid #dc2626' : '4px solid #2c7a5e';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function normalizePhone(phone) {
        if (!phone) return "";
        let normalized = String(phone).replace(/\D/g, '');
        if (normalized.startsWith('254')) normalized = normalized.substring(3);
        else if (normalized.startsWith('0')) normalized = normalized.substring(1);
        return normalized;
    }
    
    async function apiCall(action, params = {}) {
        let url = `${API_BASE_URL}?action=${action}`;
        Object.keys(params).forEach(key => {
            if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
                url += `&${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`;
            }
        });
        
        try {
            const response = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("API Error:", err);
            return { success: false, error: err.message };
        }
    }
    
    function updateUnitConversions() {
        totalUnitsReceived = transferHistory.reduce((sum, t) => sum + (t.units || 0), 0);
        transactionCount = transferHistory.length;
        
        localStorage.setItem(`units_received_${currentCustomer?.phone}`, totalUnitsReceived);
        localStorage.setItem(`transaction_count_${currentCustomer?.phone}`, transactionCount);
        
        return { totalUnitsReceived, transactionCount };
    }
    
    function getStoredUnitConversions() {
        if (!currentCustomer) return { totalUnitsReceived: 0, transactionCount: 0 };
        
        const storedUnits = localStorage.getItem(`units_received_${currentCustomer.phone}`);
        const storedCount = localStorage.getItem(`transaction_count_${currentCustomer.phone}`);
        
        return {
            totalUnitsReceived: storedUnits ? parseInt(storedUnits) : 0,
            transactionCount: storedCount ? parseInt(storedCount) : 0
        };
    }
    
    async function saveTransferRequestToSheet(transferData) {
        return await apiCall("saveTransferRequest", transferData);
    }
    
    // Mobile Menu Functions
    function initMobileMenu() {
        const existingToggle = document.querySelector('.mobile-menu-toggle');
        const existingOverlay = document.querySelector('.mobile-overlay');
        if (existingToggle) existingToggle.remove();
        if (existingOverlay) existingOverlay.remove();
        
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'mobile-menu-toggle';
        toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
        toggleBtn.onclick = toggleMobileMenu;
        document.body.appendChild(toggleBtn);
        
        const overlay = document.createElement('div');
        overlay.className = 'mobile-overlay';
        overlay.onclick = closeMobileMenu;
        document.body.appendChild(overlay);
        
        const sidebar = document.querySelector('.portal-sidebar');
        if (sidebar) {
            sidebar.classList.remove('open');
        }
    }
    
    function toggleMobileMenu() {
        const sidebar = document.querySelector('.portal-sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const toggleBtn = document.querySelector('.mobile-menu-toggle');
        
        if (sidebar && overlay) {
            if (mobileMenuOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                mobileMenuOpen = false;
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('show');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-times"></i>';
                mobileMenuOpen = true;
            }
        }
    }
    
    function closeMobileMenu() {
        const sidebar = document.querySelector('.portal-sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const toggleBtn = document.querySelector('.mobile-menu-toggle');
        
        if (sidebar && overlay) {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
            if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
            mobileMenuOpen = false;
        }
    }
    
    // ==================== LOGIN SCREEN ====================
    function renderLogin() {
        return `
            <div class="login-container">
                <div class="login-card">
                    <h2><i class="fas fa-users"></i> Customer Portal</h2>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <input type="tel" id="customerPhone" placeholder="0712345678">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> PIN (Last 4 digits of ID)</label>
                        <input type="password" id="customerPin" placeholder="Enter PIN" maxlength="4">
                    </div>
                    <button class="btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Access Portal</button>
                    <div id="loginError" style="color:#c2410c; text-align:center; margin-top:1rem;"></div>
                </div>
            </div>
        `;
    }
    
    async function handleLogin() {
        const phone = document.getElementById("customerPhone").value.trim();
        const pin = document.getElementById("customerPin").value;
        const errorDiv = document.getElementById("loginError");
        
        if (!phone || !pin) {
            errorDiv.innerHTML = "Please enter phone number and PIN";
            return;
        }
        
        errorDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';
        
        const linesResult = await apiCall("getLines");
        const customers = linesResult.lines || [];
        
        const customer = customers.find(c => normalizePhone(c.phone) === normalizePhone(phone));
        
        if (customer) {
            const idString = String(customer.idNumber);
            const idLast4 = idString.slice(-4);
            
            if (pin === idLast4) {
                currentCustomer = customer;
                await loadCustomerData();
                renderDashboard();
                showToast(`Welcome ${customer.name}!`);
                return;
            }
        }
        
        errorDiv.innerHTML = "Invalid phone number or PIN";
    }
    
    // ==================== LOAD CUSTOMER DATA ====================
    async function loadCustomerData() {
        const tillsResult = await apiCall("getTills");
        const allTills = tillsResult.tills || [];
        customerTills = allTills.filter(t => normalizePhone(t.phone) === normalizePhone(currentCustomer.phone));
        
        const storedHistory = localStorage.getItem(`transfers_in_${currentCustomer.phone}`);
        transferHistory = storedHistory ? JSON.parse(storedHistory) : [];
        
        const conversions = updateUnitConversions();
        totalUnitsReceived = conversions.totalUnitsReceived;
        transactionCount = conversions.transactionCount;
    }
    
    // ==================== DASHBOARD RENDER ====================

                <!-- Main Content -->
                <div class="portal-main">
                    <!-- Header -->
                    <div class="portal-header">
                        <div class="header-content">
                            <div class="welcome-section">
                                <h1>Welcome back, ${escapeHtml(currentCustomer.name)}</h1>
                                <p>Manage your tills and track your units</p>
                            </div>
                            <div class="customer-profile-card">
                                <div class="profile-avatar">
                                    <i class="fas fa-user-circle"></i>
                                </div>

                                    <h3>${escapeHtml(currentCustomer.name)}</h3>

        // Initialize mobile menu
        initMobileMenu();

        document.querySelectorAll('.nav-btn').forEach(btn => {

                const tab = btn.dataset.tab;
                switchTab(tab);
                if (window.innerWidth <= 768) {
                    closeMobileMenu();
                }
            });
        });
        
        // Stat card click handlers
        document.getElementById("transactionsStatCard")?.addEventListener("click", () => switchTab("transactions"));
        document.getElementById("unitsReceivedStatCard")?.addEventListener("click", () => switchTab("transactions"));
        document.getElementById("tillsStatCard")?.addEventListener("click", () => switchTab("tills"));
        document.getElementById("unitsStatCard")?.addEventListener("click", () => switchTab("tills"));
        document.getElementById("activeStatCard")?.addEventListener("click", () => switchTab("tills"));
        
        document.getElementById("logoutBtnPortal")?.addEventListener("click", handleLogout);
        document.getElementById("submitTransferBtn")?.addEventListener("click", handleTransferIn);
        document.getElementById("downloadStatementBtn")?.addEventListener("click", downloadStatement);
    }
    
    function renderTillsContent() {
        if (customerTills.length === 0) {
            return '<div class="empty-state"><i class="fas fa-inbox"></i><br>No tills registered yet</div>';
        }
        
        return `
            <div class="table-wrapper">

                        <tr>
                            <th>Till Number</th>
                            <th>Store Number</th>
                            <th>Current Units</th>
                            <th>Status</th>
                            <th>Date Created</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${customerTills.map(till => `
                            <tr>

    function renderTransactionsContent() {
        if (transferHistory.length === 0) {
            return '<div class="empty-state"><i class="fas fa-inbox"></i><br>No transaction history</div>';
        }
        
        const conversions = updateUnitConversions();
        
        return `
            <div style="margin-bottom: 1rem;">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div style="background: linear-gradient(135deg, #1e4a3b, #0f3b2f); padding: 0.75rem 1.25rem; border-radius: 16px; color: white;">
                        <span style="font-size: 0.7rem; opacity: 0.8;">Total Units Received</span>
                        <div style="font-size: 1.5rem; font-weight: 700;">${conversions.totalUnitsReceived}</div>
                    </div>

            <div class="table-wrapper">

                            <th>Running Total</th>

                        </tr>
                    </thead>
                    <tbody>
                        ${transferHistory.map((t, index) => {

                            for (let i = 0; i <= index; i++) {
                                runningTotal += transferHistory[i].units;

                                    <td>${new Date(t.date).toLocaleDateString()} <small>${new Date(t.date).toLocaleTimeString()}</small></div>

                                    <td>${escapeHtml(t.fromPhone || 'External')}</div>
                                    <td><span class="units-value">+${t.units} units</span></div>
                                    <td><strong>${runningTotal} units</strong></div>
                                    <td><span class="badge-completed"><i class="fas fa-check"></i> Completed</span></div>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }
    
    function renderTransferForm() {
        if (customerTills.length === 0) {
            return '<div class="empty-state"><i class="fas fa-inbox"></i><br>No tills available for transfer</div>';
        }
        
        return `
            <div class="transfer-form">
                <h3><i class="fas fa-arrow-down"></i> Transfer Units IN</h3>
                <p style="text-align: center; margin-bottom: 1rem; font-size: 0.8rem; color: #5b6e69;">Add units to your till - This will INCREASE your balance</p>
                <div class="form-group">
                    <label>Select Till</label>
                    <select id="transferTill">
                        <option value="">-- Select a till --</option>
                        ${customerTills.map(till => `
                            <option value="${escapeHtml(till.tillNumber)}" data-current-units="${till.units || 0}" data-row="${till.rowIndex}">

                        `).join('')}
                    </select>
                </div>
                <div class="form-group">
                    <label>Sender Phone Number</label>
                    <input type="tel" id="senderPhone" placeholder="0712345678" value="ADMIN">

                    <label>Units to Transfer IN</label>
                    <input type="number" id="transferUnits" placeholder="Enter number of units to add" min="1">
                    <small style="color: #5b6e69;">This will ADD units to your till</small>
                </div>
                <div class="form-group">
                    <label>Reason / Notes</label>
                    <input type="text" id="transferReason" placeholder="e.g., Stock top-up, Bonus, Purchase">
                </div>
                <button class="btn" id="submitTransferBtn"><i class="fas fa-plus-circle"></i> Add Units (Transfer In)</button>
                <div id="transferFeedback" class="feedback-message" style="display:none;"></div>
            </div>
        `;
    }
    
    function renderStatementContent() {
        const totalUnits = customerTills.reduce((sum, t) => sum + (t.units || 0), 0);
        const activeTills = customerTills.filter(t => t.status === "active").length;
        const conversions = updateUnitConversions();
        
        return `
            <div class="transfer-form">
                <h3><i class="fas fa-file-alt"></i> Account Statement</h3>
                <div style="margin-bottom: 1rem; padding: 0.75rem; background: #f8fbf9; border-radius: 16px;">
                    <p><strong>Name:</strong> ${escapeHtml(currentCustomer.name)}</p>
                    <p><strong>Phone:</strong> ${escapeHtml(currentCustomer.phone)}</p>
                    <p><strong>Total Tills:</strong> ${customerTills.length}</p>
                    <p><strong>Current Units:</strong> ${totalUnits}</p>
                    <p><strong>Active Tills:</strong> ${activeTills}</p>
                    <p><strong>Total Units Received:</strong> ${conversions.totalUnitsReceived}</p>
                    <p><strong>Total Transactions:</strong> ${conversions.transactionCount}</p>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Till Number</th>
                                <th>Store</th>
                                <th>Units</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${customerTills.map(till => `
                                <tr>
                                    <td>${escapeHtml(till.tillNumber)}</div>
                                    <td>${escapeHtml(till.storeNumber)}</div>
                                    <td>${till.units || 0}</div>
                                    <td>${till.status === "active" ? "Active" : "Inactive"}</div>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <button class="btn" id="downloadStatementBtn" style="margin-top: 1rem;"><i class="fas fa-download"></i> Download Statement</button>
            </div>
        `;
    }
    
    async function handleTransferIn() {
        const tillSelect = document.getElementById("transferTill");
        const selectedOption = tillSelect.options[tillSelect.selectedIndex];
        const tillNumber = tillSelect.value;
        const rowIndex = selectedOption?.dataset.row;
        const currentUnits = parseInt(selectedOption?.dataset.currentUnits || 0);
        const senderPhone = document.getElementById("senderPhone").value.trim();
        const units = parseInt(document.getElementById("transferUnits").value);
        const reason = document.getElementById("transferReason")?.value.trim() || "Unit top-up";
        const feedback = document.getElementById("transferFeedback");
        
        if (!tillNumber) {
            feedback.style.display = "block";
            feedback.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please select a till';
            feedback.className = "feedback-message feedback-error";
            return;
        }
        if (!units || units <= 0) {
            feedback.style.display = "block";
            feedback.innerHTML = '<i class="fas fa-exclamation-circle"></i> Please enter valid units to add';
            feedback.className = "feedback-message feedback-error";
            return;
        }
        
        feedback.style.display = "block";
        feedback.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Adding units to till...';
        feedback.className = "feedback-message";
        
        const updateRes = await apiCall("updateUnits", { rowIndex: parseInt(rowIndex), addUnits: units });
        
        if (updateRes.success) {
            const tillIndex = customerTills.findIndex(t => t.tillNumber === tillNumber);
            if (tillIndex !== -1) {
                customerTills[tillIndex].units = (customerTills[tillIndex].units || 0) + units;
            }
            
            const transferRecord = {
                id: Date.now(),
                tillNumber: tillNumber,
                fromPhone: senderPhone || "SYSTEM",
                fromName: senderPhone === "ADMIN" ? "Administrator" : senderPhone,
                toPhone: currentCustomer.phone,
                toName: currentCustomer.name,
                units: units,
                reason: reason,
                type: "TRANSFER_IN",
                status: "completed",
                date: new Date().toISOString()
            };
            
            await saveTransferRequestToSheet(transferRecord);
            
            transferHistory.unshift(transferRecord);
            localStorage.setItem(`transfers_in_${currentCustomer.phone}`, JSON.stringify(transferHistory));
            
            updateUnitConversions();
            
            const newTotalUnits = customerTills.reduce((sum, t) => sum + (t.units || 0), 0);
            
            feedback.innerHTML = `<i class="fas fa-check-circle"></i> Successfully added ${units} units to ${tillNumber}! New balance: ${currentUnits + units} units`;
            feedback.className = "feedback-message feedback-success";
            
            document.getElementById("transferUnits").value = "";
            document.getElementById("senderPhone").value = "ADMIN";
            document.getElementById("transferReason").value = "";
            document.getElementById("transferTill").value = "";
            
            // Update stats in real-time
            const totalUnitsElement = document.querySelector('#unitsStatCard .stat-number');
            const transactionsStatElement = document.querySelector('#transactionsStatCard .stat-number');
            const unitsReceivedStatElement = document.querySelector('#unitsReceivedStatCard .stat-number');
            
            if (totalUnitsElement) totalUnitsElement.textContent = newTotalUnits;
            if (transactionsStatElement) transactionsStatElement.textContent = transferHistory.length;
            if (unitsReceivedStatElement) {
                const newTotalReceived = transferHistory.reduce((sum, t) => sum + (t.units || 0), 0);
                unitsReceivedStatElement.textContent = newTotalReceived;
            }
            
            setTimeout(() => {
                if (currentTab === "transactions") {
                    document.getElementById("transactionsContent").innerHTML = renderTransactionsContent();
                }
                if (currentTab === "tills") {
                    document.getElementById("tillsContent").innerHTML = renderTillsContent();
                }
                showToast(`Successfully added ${units} units to your till!`);
            }, 500);
        } else {
            feedback.innerHTML = `<i class="fas fa-exclamation-circle"></i> Transfer failed: ${updateRes.error}`;
            feedback.className = "feedback-message feedback-error";
        }
    }
    
    function switchTab(tab) {
        currentTab = tab;
        
        document.getElementById("tillsContent").style.display = tab === "tills" ? "block" : "none";
        document.getElementById("transactionsContent").style.display = tab === "transactions" ? "block" : "none";
        document.getElementById("transferContent").style.display = tab === "transfer" ? "block" : "none";
        document.getElementById("statementContent").style.display = tab === "statement" ? "block" : "none";
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.dataset.tab === tab) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        if (tab === "statement") {
            document.getElementById("downloadStatementBtn")?.addEventListener("click", downloadStatement);
        }
        
        if (tab === "transactions") {
            updateUnitConversions();
        }
        
        // Close mobile menu on tab change
        if (window.innerWidth <= 768) {
            closeMobileMenu();
        }
    }
    
    function downloadStatement() {
        const totalUnits = customerTills.reduce((sum, t) => sum + (t.units || 0), 0);
        const conversions = updateUnitConversions();
        
        let html = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Statement - ${currentCustomer.name}</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 2rem; }
                    .header { text-align: center; margin-bottom: 2rem; }
                    .logo { color: #1e4a3b; font-size: 1.5rem; font-weight: 800; }
                    .info { margin-bottom: 2rem; padding: 1rem; background: #f8fbf9; border-radius: 12px; }
                    .stats { display: flex; gap: 1rem; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; }
                    .stat-box { background: #1e4a3b; color: white; padding: 1rem; border-radius: 12px; text-align: center; flex: 1; }
                    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
                    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                    th { background: #1e4a3b; color: white; }
                </style>
            </head>
            <body>
                <div class="header">
                    <div class="logo">⚡ JamiiSim Network</div>
                    <h1>Customer Statement</h1>
                    <p>Generated on ${new Date().toLocaleString()}</p>
                </div>
                <div class="info">
                    <p><strong>Name:</strong> ${currentCustomer.name}</p>
                    <p><strong>Phone:</strong> ${currentCustomer.phone}</p>
                    <p><strong>ID:</strong> ${currentCustomer.idNumber}</p>
                </div>
                <div class="stats">
                    <div class="stat-box"><div class="stat-number">${customerTills.length}</div><div>Tills</div></div>
                    <div class="stat-box"><div class="stat-number">${totalUnits}</div><div>Current Units</div></div>
                    <div class="stat-box"><div class="stat-number">${conversions.transactionCount}</div><div>Transactions</div></div>
                    <div class="stat-box"><div class="stat-number">${conversions.totalUnitsReceived}</div><div>Units Received</div></div>
                </div>
                <h3>Till Details</h3>
                <table>
                    <tr><th>Till Number</th><th>Store</th><th>Units</th><th>Status</th></tr>
                    ${customerTills.map(t => `<tr><td>${t.tillNumber}</td><td>${t.storeNumber}</td><td>${t.units || 0}</td><td>${t.status}</td></tr>`).join('')}
                </table>
                <h3>Transaction History</h3>
                </table>
                    <tr><th>Date</th><th>From</th><th>Units</th><th>Reason</th></tr>
                    ${transferHistory.map(t => `<tr><td>${new Date(t.date).toLocaleString()}</td><td>${t.fromPhone}</td>:+${t.units}</td><td>${t.reason}</td></tr>`).join('')}
                </table>
            </body>
            </html>
        `;
        
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `JamiiSim_Statement_${currentCustomer.phone}_${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("Statement downloaded!");
    }
    
    function handleLogout() {
        currentCustomer = null;
        customerTills = [];
        transferHistory = [];
        renderLogin();
        document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
        showToast("Logged out successfully");
    }
    
    function render() {
        const app = document.getElementById("app");
        if (currentCustomer) {
            renderDashboard();
        } else {
            app.innerHTML = renderLogin();
            document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
        }
    }
    
    render();
