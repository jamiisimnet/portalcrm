<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JamiiSim - Customer Portal with Telegram</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b2b26 0%, #1e4a3b 50%, #2c7a5e 100%);
            padding: 1rem;
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e4a3b, #2c7a5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #1e4a3b;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2edeb;
            border-radius: 30px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #2c7a5e;
            outline: none;
        }

        .btn {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 74, 59, 0.3);
        }

        /* Customer Portal Dashboard */
        .customer-portal {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
        }

        /* Mobile Menu */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1001;
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            align-items: center;
            justify-content: center;
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Sidebar */
        .portal-sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0a221d 0%, #0c2b25 100%);
            color: white;
            padding: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            transition: all 0.3s;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .portal-sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s ease;
            }
            .portal-sidebar.open {
                left: 0;
                box-shadow: 4px 0 20px rgba(0,0,0,0.3);
            }
            .mobile-menu-toggle {
                display: flex;
            }
            .mobile-overlay.show {
                display: block;
            }
            .portal-main {
                width: 100%;
            }
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.5rem;
            margin-bottom: 2rem;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .sidebar-logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-logo-icon i {
            font-size: 1.3rem;
            color: #5bc0a3;
        }

        .sidebar-logo-text h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .sidebar-logo-text p {
            font-size: 0.6rem;
            opacity: 0.7;
        }

        .sidebar-nav {
            flex: 1;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav ul li {
            margin: 0.3rem 0;
        }

        .sidebar-nav ul li button {
            background: transparent;
            border: none;
            color: #b8cdc5;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .sidebar-nav ul li button i {
            width: 22px;
            font-size: 1rem;
        }

        .sidebar-nav ul li button:hover {
            background: rgba(44, 122, 94, 0.3);
            color: white;
        }

        .sidebar-nav ul li .active {
            background: linear-gradient(135deg, #2c7a5e, #1e4a3b);
            color: white;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-footer button {
            background: transparent;
            border: none;
            color: #b8cdc5;
            width: 100%;
            text-align: left;
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .sidebar-footer button:hover {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
        }

        /* Main Content */
        .portal-main {
            flex: 1;
            overflow-y: auto;
        }

        .portal-header {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            padding: 1rem 1.5rem;
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .welcome-section h1 {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
        }

        .welcome-section p {
            font-size: 0.75rem;
            opacity: 0.8;
            color: white;
        }

        .customer-profile-card {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255,255,255,0.1);
            padding: 0.4rem 1rem;
            border-radius: 50px;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #5bc0a3, #2c7a5e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar i {
            font-size: 1.2rem;
            color: white;
        }

        .profile-details h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: white;
        }

        .profile-details p {
            font-size: 0.7rem;
            opacity: 0.8;
            color: white;
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
            padding: 1.5rem;
        }

        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(44, 122, 94, 0.1);
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e8f5e9, #d4ebd6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
        }

        .stat-icon i {
            font-size: 1.3rem;
            color: #2c7a5e;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e4a3b;
        }

        .stat-label {
            font-size: 0.7rem;
            color: #5b6e69;
            text-transform: uppercase;
        }

        /* Content Area */
        .content-area {
            padding: 1rem 1.5rem 1.5rem;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 20px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        .data-table thead tr {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
        }

        .data-table th {
            padding: 10px 14px;
            text-align: left;
            color: white;
            font-weight: 600;
            font-size: 0.7rem;
        }

        .data-table td {
            padding: 8px 14px;
            border-bottom: 1px solid #eef2f0;
            font-size: 0.8rem;
        }

        .data-table tbody tr:hover {
            background: #f8fbf9;
        }

        /* Badges */
        .badge-active {
            background: #e8f5e9;
            color: #2b7e5a;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-inactive {
            background: #ffebee;
            color: #c2410c;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge-incoming {
            background: #e3f2fd;
            color: #1565c0;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Telegram Settings Card */
        .telegram-card {
            background: linear-gradient(135deg, #1e4a3b, #0f3b2f);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            color: white;
        }

        .telegram-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .telegram-card p {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 1rem;
        }

        .telegram-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .telegram-input-group input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .btn-telegram {
            background: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-telegram:hover {
            background: #006699;
            transform: translateY(-2px);
        }

        .telegram-status {
            margin-top: 0.8rem;
            padding: 0.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .status-connected {
            background: rgba(255,255,255,0.2);
            color: #a8d5c2;
        }

        .status-disconnected {
            background: rgba(255,255,255,0.15);
            color: #ffcccb;
        }

        /* Transfer Form */
        .transfer-form {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .transfer-form h3 {
            color: #1e4a3b;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 1.2rem;
        }

        .transfer-form select,
        .transfer-form input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2edeb;
            border-radius: 16px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .feedback-message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
        }

        .feedback-success {
            background: #e8f5e9;
            color: #2b7e5a;
        }

        .feedback-error {
            background: #ffebee;
            color: #c2410c;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-size: 0.85rem;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #5b6e69;
        }

        @media (max-width: 768px) {
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
                padding: 1rem;
                gap: 0.75rem;
            }
            .content-area {
                padding: 1rem;
            }
            .portal-header {
                padding: 1rem;
                margin-top: 50px;
            }
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .welcome-section h1 {
                font-size: 1.1rem;
            }
            .stat-number {
                font-size: 1.2rem;
            }
            .telegram-input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ==================== TELEGRAM CONFIGURATION ====================
    const TELEGRAM_BOT_TOKEN = "8786753893:AAEnCBeMrSPqAyrX-7PXXPuVHz79YrEwvZQ";
    const TELEGRAM_BOT_USERNAME = "jamiisim2bot";
    const TELEGRAM_API_URL = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}`;
    
    // Google Sheets API Configuration
    const API_BASE_URL = "https://script.google.com/macros/s/AKfycbx-ggpKM1cMYW48ojsD3wuy8vkyJP4sLe31KDi4w8sF559e22i8ZvVFydnooGu4lnpQ/exec";
    
    let currentCustomer = null;
    let customerTills = [];
    let transferHistory = [];
    let totalUnitsReceived = 0;
    let transactionCount = 0;
    let currentTab = "tills";
    let mobileMenuOpen = false;
    let customerTelegramId = null;
    let customerTelegramUsername = null;
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isError ? '#fee2e2' : 'white';
        toast.style.color = isError ? '#dc2626' : '#1e4a3b';
        toast.style.borderLeft = isError ? '4px solid #dc2626' : '4px solid #2c7a5e';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function normalizePhone(phone) {
        if (!phone) return "";
        let normalized = String(phone).replace(/\D/g, '');
        if (normalized.startsWith('254')) normalized = normalized.substring(3);
        else if (normalized.startsWith('0')) normalized = normalized.substring(1);
        return normalized;
    }
    
    async function apiCall(action, params = {}) {
        let url = `${API_BASE_URL}?action=${action}`;
        Object.keys(params).forEach(key => {
            if (params[key] !== undefined && params[key] !== null && params[key] !== "") {
                url += `&${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`;
            }
        });
        
        try {
            const response = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("API Error:", err);
            return { success: false, error: err.message };
        }
    }
    
    // ==================== TELEGRAM FUNCTIONS ====================
    
    // Send message to Telegram user
    async function sendTelegramMessage(chatId, message) {
        if (!TELEGRAM_BOT_TOKEN || TELEGRAM_BOT_TOKEN === "8786753893:AAEnCBeMrSPqAyrX-7PXXPuVHz79YrEwvZQ") {
            console.log("Telegram bot configured:", TELEGRAM_BOT_USERNAME);
        }
        
        try {
            const response = await fetch(`${TELEGRAM_API_URL}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message,
                    parse_mode: 'HTML'
                })
            });
            const data = await response.json();
            if (!data.ok) {
                console.error("Telegram API Error:", data.description);
            }
            return { success: data.ok, error: data.description };
        } catch (err) {
            console.error("Telegram API Error:", err);
            return { success: false, error: err.message };
        }
    }
    
    // Get chat ID from Telegram username
    async function getChatIdFromUsername(username) {
        // Remove @ if present
        const cleanUsername = username.replace('@', '');
        
        try {
            // Try to get updates to find the user's chat_id
            const response = await fetch(`${TELEGRAM_API_URL}/getUpdates`);
            const data = await response.json();
            
            if (data.ok && data.result) {
                // Find the user in recent messages
                for (const update of data.result) {
                    const message = update.message || update.channel_post;
                    if (message && message.chat) {
                        const msgUsername = message.from?.username;
                        const chatId = message.chat.id;
                        
                        if (msgUsername && msgUsername.toLowerCase() === cleanUsername.toLowerCase()) {
                            return { success: true, chatId: chatId };
                        }
                    }
                }
            }
            return { success: false, error: "User not found. Please send a message to @jamiisim2bot first." };
        } catch (err) {
            return { success: false, error: err.message };
        }
    }
    
    // Save Telegram username to localStorage
    function saveTelegramUsername(username, chatId) {
        if (!currentCustomer) return false;
        
        const telegramData = {
            username: username,
            chatId: chatId,
            updatedAt: new Date().toISOString()
        };
        
        localStorage.setItem(`telegram_${currentCustomer.phone}`, JSON.stringify(telegramData));
        customerTelegramUsername = username;
        customerTelegramId = chatId;
        
        return true;
    }
    
    // Get Telegram username for customer
    function getTelegramUsername() {
        if (!currentCustomer) return null;
        
        const stored = localStorage.getItem(`telegram_${currentCustomer.phone}`);
        if (stored) {
            const data = JSON.parse(stored);
            customerTelegramUsername = data.username;
            customerTelegramId = data.chatId;
            return data;
        }
        return null;
    }
    
    // Send notification about transfer
    async function notifyTransfer(tillNumber, units, newBalance, senderPhone) {
        if (!customerTelegramId) return;
        
        const message = `
🔔 <b>JamiiSim Network - Transfer Notification</b>
        
✅ <b>Transfer Received!</b>
        
📱 <b>Till Number:</b> ${tillNumber}
📦 <b>Units Added:</b> +${units}
💰 <b>New Balance:</b> ${newBalance} units
👤 <b>From:</b> ${senderPhone || 'Administrator'}
📅 <b>Date:</b> ${new Date().toLocaleString()}
        
Thank you for using JamiiSim Network!
        `;
        
        await sendTelegramMessage(customerTelegramId, message);
    }
    
    // Send login notification
    async function notifyLogin() {
        if (!customerTelegramId) return;
        
        const message = `
🔐 <b>JamiiSim Network - Login Alert</b>
        
👋 <b>Welcome back, ${currentCustomer.name}!</b>
        
📱 <b>Phone:</b> ${currentCustomer.phone}
📅 <b>Login Time:</b> ${new Date().toLocaleString()}
        
If this wasn't you, please contact support immediately.
        `;
        
        await sendTelegramMessage(customerTelegramId, message);
    }
    
    // Send test message
    async function sendTestMessage() {
        if (!customerTelegramId) {
            showToast("Please connect your Telegram account first", true);
            return false;
        }
        
        const testMsg = `
🔔 <b>JamiiSim Test Notification</b>
        
This is a test message to confirm your Telegram connection is working properly.
        
✅ <b>Status:</b> Connected
👤 <b>Account:</b> ${currentCustomer.name}
📅 <b>Time:</b> ${new Date().toLocaleString()}
        
If you received this, your notifications are working!
        `;
        
        const result = await sendTelegramMessage(customerTelegramId, testMsg);
        
        if (result.success) {
            showToast("Test message sent to your Telegram!");
        } else {
            showToast("Failed to send: " + result.error, true);
        }
        
        return result.success;
    }
    
    // ==================== LOGIN SCREEN ====================
    function renderLogin() {
        return `

    async function handleLogin() {
        const phone = document.getElementById("customerPhone").value.trim();
        const pin = document.getElementById("customerPin").value;
        const errorDiv = document.getElementById("loginError");
        
        if (!phone || !pin) {
            errorDiv.innerHTML = "Please enter phone number and PIN";
            return;
        }
        
        errorDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Verifying...';
        
        const linesResult = await apiCall("getLines");
        const customers = linesResult.lines || [];
        
        const customer = customers.find(c => normalizePhone(c.phone) === normalizePhone(phone));
        
        if (customer) {
            const idString = String(customer.idNumber);
            const idLast4 = idString.slice(-4);
            
            if (pin === idLast4) {
                currentCustomer = customer;
                await loadCustomerData();
                
                // Load Telegram settings
                const telegramData = getTelegramUsername();
                if (telegramData && telegramData.chatId) {
                    await notifyLogin();
                }
                
                renderDashboard();
                showToast(`Welcome ${customer.name}!`);
                return;
            }
        }
        
        errorDiv.innerHTML = "Invalid phone number or PIN";
    }
    
    // ==================== LOAD CUSTOMER DATA ====================
    async function loadCustomerData() {
        const tillsResult = await apiCall("getTills");
        const allTills = tillsResult.tills || [];
        customerTills = allTills.filter(t => normalizePhone(t.phone) === normalizePhone(currentCustomer.phone));
        
        const storedHistory = localStorage.getItem(`transfers_in_${currentCustomer.phone}`);
        transferHistory = storedHistory ? JSON.parse(storedHistory) : [];
        
        totalUnitsReceived = transferHistory.reduce((sum, t) => sum + (t.units || 0), 0);
        transactionCount = transferHistory.length;
        
        // Load Telegram settings
        getTelegramUsername();
    }

    async function handleTransferIn() {
        const tillSelect = document.getElementById("transferTill");
        const selectedOption = tillSelect.options[tillSelect.selectedIndex];
        const tillNumber = tillSelect.value;
        const rowIndex = selectedOption?.dataset.row;
        const currentUnits = parseInt(selectedOption?.dataset.currentUnits || 0);
        const senderPhone = document.getElementById("senderPhone").value.trim();
        const units = parseInt(document.getElementById("transferUnits").value);
        const reason = document.getElementById("transferReason")?.value.trim() || "Unit top-up";
        const feedback = document.getElementById("transferFeedback");
        
        if (!tillNumber) {
            feedback.style.display = "block";
            feedback.innerHTML = 'Please select a till';
            feedback.className = "feedback-message feedback-error";
            return;
        }
        if (!units || units <= 0) {
            feedback.style.display = "block";
            feedback.innerHTML = 'Please enter valid units to add';
            feedback.className = "feedback-message feedback-error";
            return;
        }
        
        feedback.style.display = "block";
        feedback.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
        feedback.className = "feedback-message";
        
        const updateRes = await apiCall("updateUnits", { rowIndex: parseInt(rowIndex), addUnits: units });
        
        if (updateRes.success) {
            const tillIndex = customerTills.findIndex(t => t.tillNumber === tillNumber);
            if (tillIndex !== -1) {
                customerTills[tillIndex].units = (customerTills[tillIndex].units || 0) + units;
            }
            
            const newBalance = currentUnits + units;
            
            const transferRecord = {
                id: Date.now(),
                tillNumber: tillNumber,
                fromPhone: senderPhone || "SYSTEM",
                toPhone: currentCustomer.phone,
                units: units,
                reason: reason,
                date: new Date().toISOString()
            };
            
            transferHistory.unshift(transferRecord);
            localStorage.setItem(`transfers_in_${currentCustomer.phone}`, JSON.stringify(transferHistory));
            
            // Send Telegram notification
            if (customerTelegramId) {
                await notifyTransfer(tillNumber, units, newBalance, senderPhone);
            }
            
            totalUnitsReceived = transferHistory.reduce((sum, t) => sum + (t.units || 0), 0);
            transactionCount = transferHistory.length;
            
            feedback.innerHTML = `✓ Success! Added ${units} units. New balance: ${newBalance} units`;
            feedback.className = "feedback-message feedback-success";
            
            document.getElementById("transferUnits").value = "";
            document.getElementById("transferReason").value = "";
            document.getElementById("transferTill").value = "";
            
            // Update stats
            setTimeout(() => {
                if (currentTab === "transactions") {
                    document.getElementById("transactionsContent").innerHTML = renderTransactionsContent();
                }
                if (currentTab === "tills") {
                    document.getElementById("tillsContent").innerHTML = renderTillsContent();
                }
                // Update stat numbers
                const stats = document.querySelectorAll('.stat-number');
                if (stats[1]) stats[1].textContent = customerTills.reduce((sum, t) => sum + (t.units || 0), 0);
                if (stats[2]) stats[2].textContent = transactionCount;
                if (stats[3]) stats[3].textContent = totalUnitsReceived;
                
                showToast(`Added ${units} units successfully!`);
            }, 500);
        } else {
            feedback.innerHTML = `Failed: ${updateRes.error}`;
            feedback.className = "feedback-message feedback-error";
        }
    }
    
    async function handleSaveTelegram() {
        const username = document.getElementById("telegramUsername").value.trim();
        
        if (!username) {
            showToast("Please enter your Telegram username", true);
            return;
        }
        
        // Remove @ if present
        const cleanUsername = username.replace('@', '');
        
        showToast("Verifying Telegram username...");
        
        // Try to get chat ID from Telegram
        const result = await getChatIdFromUsername(cleanUsername);
        
        if (result.success && result.chatId) {
            saveTelegramUsername(cleanUsername, result.chatId);
            
            // Send welcome message
            const welcomeMsg = `
🎉 <b>Welcome to JamiiSim Telegram Notifications!</b>
        
Hello ${currentCustomer.name},
        
You will now receive real-time updates about:
• Unit transfers to your account
• Login alerts
• Account statements
        
Thank you for using JamiiSim Network!
        `;
            
            await sendTelegramMessage(result.chatId, welcomeMsg);
            
            showToast(`✅ Connected! Welcome message sent to @${cleanUsername}`);

    // Mobile Menu Functions
    function initMobileMenu() {
        const existingToggle = document.querySelector('.mobile-menu-toggle');
        const existingOverlay = document.querySelector('.mobile-overlay');
        if (existingToggle) existingToggle.remove();
        if (existingOverlay) existingOverlay.remove();
        
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'mobile-menu-toggle';
        toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
        toggleBtn.onclick = toggleMobileMenu;
        document.body.appendChild(toggleBtn);
        
        const overlay = document.createElement('div');
        overlay.className = 'mobile-overlay';
        overlay.onclick = closeMobileMenu;
        document.body.appendChild(overlay);
        
        const sidebar = document.querySelector('.portal-sidebar');
        if (sidebar) sidebar.classList.remove('open');
    }
    
    function toggleMobileMenu() {
        const sidebar = document.querySelector('.portal-sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const toggleBtn = document.querySelector('.mobile-menu-toggle');
        
        if (sidebar && overlay) {
            if (mobileMenuOpen) {
                sidebar.classList.remove('open');
                overlay.classList.remove('show');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
                mobileMenuOpen = false;
            } else {
                sidebar.classList.add('open');
                overlay.classList.add('show');
                if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-times"></i>';
                mobileMenuOpen = true;
            }
        }
    }
    
    function closeMobileMenu() {
        const sidebar = document.querySelector('.portal-sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const toggleBtn = document.querySelector('.mobile-menu-toggle');
        
        if (sidebar && overlay) {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
            if (toggleBtn) toggleBtn.innerHTML = '<i class="fas fa-bars"></i>';
            mobileMenuOpen = false;
        }
    }
    
    function switchTab(tab) {
        currentTab = tab;

        document.getElementById(`${tab}Content`).style.display = 'block';
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if (btn.dataset.tab === tab) {
                btn.classList.add('active');
            } else {

            }
        });
        
        if (window.innerWidth <= 768) closeMobileMenu();
        
        if (tab === "statement") {
            document.getElementById("downloadStatementBtn")?.addEventListener("click", downloadStatement);
        }
    }
    
    function handleLogout() {
        currentCustomer = null;
        renderLogin();
        document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
        showToast("Logged out successfully");
    }
    
    function render() {
        const app = document.getElementById("app");
        if (currentCustomer) {
            renderDashboard();
        } else {
            app.innerHTML = renderLogin();
            document.getElementById("loginBtn")?.addEventListener("click", handleLogin);
        }
    }
    
    render();
</script>
</body>
</html>
